name: Deploy web to prod

# Manual trigger only for now. Add a `push: branches: [main]` block here
# once you're comfortable having every main commit auto-deploy.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (show what would change, don't upload)"
        type: boolean
        default: false

# Cancel any in-flight deploy if a new one is queued.
concurrency:
  group: deploy-web-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build + FTP upload
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build web target
        run: npm run build:web

      - name: Resolve + sanity-check deploy target
        id: target
        env:
          FTP_PATH_RAW: ${{ vars.SFTP_PATH || secrets.SFTP_PATH }}
        run: |
          # Strip leading/trailing whitespace (newlines, tabs, spaces).
          # Catches a common paste mistake when populating secrets.
          FTP_PATH=$(printf '%s' "$FTP_PATH_RAW" | tr -d '[:space:]')

          if [ -z "$FTP_PATH" ]; then
            echo "::error::Deploy path is empty (after whitespace trim). Set SFTP_PATH as a repo Variable or Secret." >&2
            exit 1
          fi
          if [ "$FTP_PATH" = "/" ]; then
            echo "::error::Deploy path is '/'. Refusing — would risk deleting files outside the intended directory." >&2
            exit 1
          fi
          if [ "${FTP_PATH#/}" = "$FTP_PATH" ]; then
            echo "::error::Deploy path must be absolute (start with '/'). Got: $FTP_PATH" >&2
            exit 1
          fi
          if [ ! -d dist/web ] || [ -z "$(ls -A dist/web)" ]; then
            echo "::error::dist/web is missing or empty. Build must have failed silently." >&2
            exit 1
          fi

          # Make the cleaned value available to the upload step.
          echo "ftp_path=$FTP_PATH" >> "$GITHUB_OUTPUT"
          echo "Will upload $(find dist/web -type f | wc -l | tr -d ' ') files to $FTP_PATH"

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Upload via FTP
        env:
          # Keeping the SFTP_* secret names for continuity even though
          # we use the FTP protocol — same credentials, the host accepts
          # both. To switch to FTPS, change the protocol line below from
          # `ftp://` to `ftps://` and uncomment the ssl-force settings.
          FTP_HOST: ${{ secrets.SFTP_HOST }}
          FTP_USER: ${{ secrets.SFTP_USER }}
          FTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          FTP_PATH: ${{ steps.target.outputs.ftp_path }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # Trim whitespace from credentials.
          FTP_USER=$(printf '%s' "$FTP_USER" | tr -d '[:space:]')
          FTP_PASSWORD=$(printf '%s' "$FTP_PASSWORD" | tr -d '[:space:]')

          DRY_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_FLAG="--dry-run"
            echo "::notice::Dry-run mode — no files will be uploaded or deleted on the server."
          fi

          # Notes on the mirror flags below:
          # --reverse: push local → remote (mirror's default is the other way)
          # --delete: remove remote files no longer present locally (within FTP_PATH only)
          # --verbose: show every transfer
          # --parallel=4: 4 concurrent transfers
          # --exclude-glob '.*': skip dotfiles (preserves .htaccess, .env, etc.)
          # By default lftp uploads new files before deleting stale ones,
          # so in-flight requests for the previous deploy can usually
          # complete before their JS chunks disappear.
          #
          # SECURITY NOTE: plain `ftp://` sends credentials and file
          # contents over the wire in cleartext. The host accepts FTPS
          # too — to upgrade, change `ftp://` to `ftps://` and uncomment
          # the two ssl-force lines below.
          # Why the sed pipe: lftp echoes its connection URL with
          # credentials embedded (e.g. `ftp://USER:PASS@HOST/...`) when
          # mirror runs verbose-mode commands like `mkdir -p`. lftp uses
          # different URL-encoding rules than GitHub's secret matcher —
          # `#` and `*` in the password come through unescaped, so the
          # exact-string mask doesn't match. The sed strips the
          # entire `user:pass@` segment from any URL-shaped substring
          # before it reaches the log, regardless of encoding.
          lftp -c "
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set net:timeout 30;
            set ftp:passive-mode yes;
            # set ftp:ssl-force yes;
            # set ftp:ssl-protect-data yes;
            open -u '$FTP_USER','$FTP_PASSWORD' ftp://$FTP_HOST;
            mirror --reverse --delete --verbose --parallel=4 \
              --exclude-glob '.*' \
              $DRY_FLAG \
              dist/web/ '$FTP_PATH';
            bye
          " 2>&1 | sed -E 's|([a-z]+)://[^/@[:space:]]+@|\1://***@|g'

      - name: Summary
        if: success()
        run: |
          echo "### Deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "**Mode:** dry-run (no changes made on the server)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Mode:** live" >> "$GITHUB_STEP_SUMMARY"
            echo "**Protocol:** FTP" >> "$GITHUB_STEP_SUMMARY"
            echo "**Bundle hash:** $(ls dist/web/main.*.js 2>/dev/null | sed 's|.*main\.||;s|\.js$||')" >> "$GITHUB_STEP_SUMMARY"
          fi
