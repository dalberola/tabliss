<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A beautiful New Tab page with many customisable backgrounds and widgets."
    />
    <meta name="theme-color" content="#3498db" />
    <meta name="color-scheme" content="light dark" />
    <link rel="manifest" href="/pwa.json" />
    <link rel="icon" href="/icons/128.png" sizes="128x128" type="image/png" />
    <link rel="icon" href="/icons/32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/128.png" />
    <title>Tabliss</title>
    <script>
      // Apply the saved theme class synchronously before any paint so the
      // initial render uses the right colours instead of flashing the default.
      var theme = localStorage.getItem("theme");
      if (theme) document.documentElement.classList.add("theme-" + theme);
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
